<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petty — تسجيل جديد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header scrolled" id="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <svg class="icon accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
        Petty
      </a>
    </div>
  </header>

  <main class="admin-page">
    <div class="container admin-box">
      <span class="eyebrow accent-text">تسجيل لأول مرة</span>
      <h1 class="text-primary">أضف معلوماتك</h1>
      <p class="admin-hint">هذه الصفحة تظهر مرة واحدة فقط لهذا الـ QR.</p>

      <form id="register-form" class="admin-form">
        <label class="admin-label" for="owner-name">الاسم</label>
        <input id="owner-name" class="admin-input" name="ownerName" type="text" required autocomplete="name" />

        <label class="admin-label" for="phone">الرقم</label>
        <input id="phone" class="admin-input" name="phone" type="tel" required autocomplete="tel" />

        <label class="admin-label" for="pet-name">اسم الحيوان الأليف</label>
        <input id="pet-name" class="admin-input" name="petName" type="text" required />

        <button type="submit" id="save-btn" class="btn btn-accent">حفظ</button>
      </form>
      <p id="form-error" class="admin-error" role="alert" hidden></p>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
